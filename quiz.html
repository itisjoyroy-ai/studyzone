<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;" oncopy="return false;" onpaste="return false;">
    <div id="quiz-area" class="container">
        <div class="header">
            <span id="timer" style="color: red; font-weight: bold; font-size: 1.2rem;">সময় গণনা হচ্ছে...</span>
        </div>
        <hr>
        <h3 id="q-title" style="margin-top: 20px;">লোড হচ্ছে...</h3>
        <div id="options" style="margin-top: 20px;"></div>
        <div class="footer" style="margin-top: 30px;">
            <p id="q-count">প্রশ্ন: ১/৩০</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
