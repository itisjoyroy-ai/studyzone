<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasoning Quiz - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">
    <div id="login-box" class="container">
        <h2>রিজনিং কুইজ লগইন</h2>
        <p id="time-info" style="color: #1a73e8; font-weight: bold;">সময়: ১১:৩০ AM - ১২:১৫ PM</p>
        <hr>
        <div style="margin-bottom: 20px;">
            <input type="text" id="userid" placeholder="ইউজার আইডি (STUDENT_01)">
            <input type="password" id="password" placeholder="পাসওয়ার্ড">
        </div>
        <button onclick="checkAccess()">পরীক্ষা শুরু করুন</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
